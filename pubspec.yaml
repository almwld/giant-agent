name: giant_agent
description: Giant AI Agent - Advanced Multi-task Intelligent Assistant
version: 3.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sq/flite: ^2.3.0
  path_provider: ^2.1.0+
  shared_preferences: ^2.2.0
  permission_handler: ^11.0.0
  intl: ^0.18.0
  http: ^1.1.0
  share_plus: ^7.2.2
  file_picker: ^6.0.0
  url_launcher: ^6.2.0
  flutter_local_notifications: ^17.0.0
  image_picker: ^1.0.0
  image: ^4.0.0
  audioplayers: ^5.2.0
  flutter_tts: ^3.8.0
  local_auth: ^2.1.0
  connectivity_plus: ^5.0.0
  device_info_plus: ^9.0.0
  package_info_plus: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/sounds/
    - assets/icons/
