name: giant_agent_x
description: Professional AI Agent with Advanced Features
version: 4.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Core
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  shared_preferences: ^2.2.0
  permission_handler: ^11.0.0
  
  # File & Media
  file_picker: ^6.0.0
  image_picker: ^1.0.0
  path: ^1.8.3
  
  # Network
  http: ^1.1.0
  
  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.7
  shimmer: ^3.0.0
  
  # Advanced Features
  flutter_local_notifications: ^17.0.0
  share_plus: ^7.2.2
  printing: ^5.11.0
  pdf: ^3.10.0
  translator: ^1.0.0
  easy_localization: ^3.0.0
  
  # Voice & Speech
  flutter_tts: ^3.8.0
  speech_to_text: ^6.6.0
  
  # Security
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/translations/
